<!doctype html>
<html lang="{{lang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
    <meta name="description" content="{{description}}" />
    <link rel="stylesheet" href="/assets/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  </head>
  <body class="{{bodyClass}}" style="{{bodyStyle}}">
    <div id="page-loader" class="page-loader" aria-hidden="true">
      <div class="spinner"></div>
    </div>
    <header class="site-header">
      <a class="brand" href="{{basePath}}/">
        <span class="brand-mark-wrap"><img class="brand-mark" src="/images/logo.svg" alt="MyNotes logo" /></span>
        <span>MyNotes</span>
      </a>
      <nav>
        <a href="{{basePath}}/">{{navHome}}</a>
        <a href="{{basePath}}/about/">{{navAbout}}</a>
        <a href="{{basePath}}/authors/">{{navAuthors}}</a>
        <a href="{{basePath}}/categories/">{{navCategories}}</a>
        <a href="{{basePath}}/search/">{{navSearch}}</a>
        <button id="lang-toggle" class="lang-toggle" type="button" aria-label="{{langToggleAria}}">{{langToggleLabel}}</button>
        <button
          id="theme-toggle"
          class="theme-toggle"
          type="button"
          aria-label="{{themeToggleAria}}"
          data-label-auto="{{themeLabelAuto}}"
          data-label-light="{{themeLabelLight}}"
          data-label-dark="{{themeLabelDark}}"
        >{{themeLabelAuto}}</button>
      </nav>
    </header>
    <main class="container">{{content}}</main>
    <footer class="site-footer">© {{year}} MyNotes</footer>
    <script>
      (() => {
        const loader = document.getElementById('page-loader');
        const themeToggle = document.getElementById('theme-toggle');
        const langToggle = document.getElementById('lang-toggle');
        let loaderTimer = null;
        const leaveDelay = 280;
        const currentLangAttr = document.documentElement.getAttribute('lang') || 'en';
        const currentLang = currentLangAttr.toLowerCase().startsWith('zh') ? 'zh' : 'en';

        const getPreferredLang = () => {
          const saved = localStorage.getItem('site-lang');
          if (saved === 'en' || saved === 'zh') return saved;
          const browser = (navigator.language || '').toLowerCase();
          return browser.startsWith('zh') ? 'zh' : 'en';
        };

        const buildLangUrl = (target) => {
          const url = new URL(window.location.href);
          const isFile = url.protocol === 'file:';

          if (isFile) {
            const normalized = url.pathname.replace(/\\\\/g, '/');
            let nextPath = normalized;
            if (/\\/dist\\/(en|zh)(?=\\/|$)/.test(normalized)) {
              nextPath = normalized.replace(/\\/dist\\/(en|zh)(?=\\/|$)/, '/dist/' + target);
            } else if (/\\/(en|zh)(?=\\/|$)/.test(normalized)) {
              nextPath = normalized.replace(/\\/(en|zh)(?=\\/|$)/, '/' + target);
            }
            url.pathname = nextPath;
            return url.toString();
          }

          const stripped = url.pathname.replace(/^\\/(en|zh)(?=\\/|$)/, '');
          const clean = stripped.startsWith('/') ? stripped : '/' + stripped;
          url.pathname = '/' + target + (clean === '/' ? '/' : clean);
          return url.toString();
        };

        const savedLang = localStorage.getItem('site-lang');
        if (!savedLang) {
          const preferred = getPreferredLang();
          if (preferred !== currentLang) {
            window.location.replace(buildLangUrl(preferred));
            return;
          }
        }

        const getAutoTheme = () => {
          const hour = new Date().getHours();
          return hour >= 7 && hour < 19 ? 'light' : 'dark';
        };

        const themeLabels = {
          auto: themeToggle?.dataset.labelAuto || 'Auto',
          light: themeToggle?.dataset.labelLight || 'Light',
          dark: themeToggle?.dataset.labelDark || 'Dark'
        };

        const applyTheme = (mode) => {
          const theme = mode === 'auto' ? getAutoTheme() : mode;
          document.documentElement.setAttribute('data-theme', theme);
          if (themeToggle) {
            themeToggle.textContent = mode === 'auto' ? themeLabels.auto : theme === 'dark' ? themeLabels.dark : themeLabels.light;
          }
          if (window.syncGiscusTheme) {
            window.syncGiscusTheme(theme);
          }
        };

        const savedMode = localStorage.getItem('theme-mode') || 'auto';
        applyTheme(savedMode);

        if (themeToggle) {
          themeToggle.addEventListener('click', () => {
            const current = localStorage.getItem('theme-mode') || 'auto';
            const next = current === 'auto' ? 'light' : current === 'light' ? 'dark' : 'auto';
            localStorage.setItem('theme-mode', next);
            applyTheme(next);
          });
        }

        if (langToggle) {
          langToggle.addEventListener('click', () => {
            const next = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('site-lang', next);
            window.location.href = buildLangUrl(next);
          });
        }

        const showLoader = () => {
          loader.classList.add('show');
        };
        const startLeaving = () => {
          document.body.classList.add('is-leaving');
        };

        const hideLoader = () => {
          loader.classList.remove('show');
          if (loaderTimer) {
            clearTimeout(loaderTimer);
            loaderTimer = null;
          }
        };

        window.addEventListener('pageshow', hideLoader);
        window.addEventListener('load', hideLoader);

        document.addEventListener('click', (event) => {
          const card = event.target.closest('.post-card');
          if (card && !event.target.closest('a, button, input, textarea, select, label')) {
            const href = card.getAttribute('data-href');
            if (href) {
              startLeaving();
              loaderTimer = setTimeout(showLoader, 320);
              setTimeout(() => {
                window.location.href = href;
              }, leaveDelay);
              return;
            }
          }

          const link = event.target.closest('a');
          if (!link) return;
          if (link.target === '_blank' || link.hasAttribute('download')) return;
          const url = new URL(link.href, window.location.origin);
          if (url.origin !== window.location.origin) return;
          if (url.pathname === window.location.pathname && url.hash) return;

          event.preventDefault();
          startLeaving();
          loaderTimer = setTimeout(showLoader, 320);
          setTimeout(() => {
            window.location.href = url.href;
          }, leaveDelay);
        });

        document.addEventListener('keydown', (event) => {
          if (event.key !== 'Enter') return;
          const card = event.target.closest('.post-card');
          if (!card) return;
          const href = card.getAttribute('data-href');
          if (!href) return;
          startLeaving();
          loaderTimer = setTimeout(showLoader, 320);
          setTimeout(() => {
            window.location.href = href;
          }, leaveDelay);
        });

        const initMermaid = () => {
          const mermaidBlocks = document.querySelectorAll('.mermaid');
          if (!mermaidBlocks.length) return;
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js';
          script.onload = () => {
            const currentTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
            if (window.mermaid) {
              window.mermaid.initialize({ startOnLoad: false, theme: currentTheme });
              window.mermaid.init(undefined, mermaidBlocks);
            }
          };
          document.head.appendChild(script);
        };

        const initMath = () => {
          const contentRoot = document.querySelector('.markdown-body');
          if (!contentRoot) return;
          const katexScript = document.createElement('script');
          katexScript.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js';
          katexScript.onload = () => {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js';
            script.onload = () => {
              if (!window.renderMathInElement) return;
              window.renderMathInElement(contentRoot, {
                delimiters: [
                  { left: '$$', right: '$$', display: true },
                  { left: '$', right: '$', display: false }
                ],
                throwOnError: false
              });
            };
            document.head.appendChild(script);
          };
          document.head.appendChild(katexScript);
        };

        initMermaid();
        initMath();
      })();
    </script>
  </body>
</html>
